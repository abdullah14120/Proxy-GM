name: Android CI/CD & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Project and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من مستودع جيت هاب
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (JDK) اللازمة لبناء أندرويد
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. تثبيت أداة Gradle على السيرفر لتوليد الـ Wrapper المفقود تلقائياً
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. توليد ملفات الـ Gradle Wrapper والـ JAR المفقودة تلقائياً على السيرفر
    - name: Generate Gradle Wrapper JAR
      run: gradle wrapper --gradle-version 8.2.2

    # 5. إعطاء صلاحيات التنفيذ لملف المحرك بعد توليده
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 6. تشغيل عملية البناء وتجميع الحزم بنجاح الآن
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    # 7. رفع ملفات الـ JAR الناتجة عن المشروع كـ Artifacts
    - name: Upload JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-JAR-Files
        path: |
          **/build/intermediates/**/*.jar
          **/build/libs/**/*.jar
        if-no-files-found: warn

    # 8. رفع ملف الـ APK الناتج
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
