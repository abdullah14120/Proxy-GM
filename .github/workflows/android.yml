name: Android CI/CD & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Project and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من مستودع جيت هاب
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (JDK 17 وهي الأنسب لإصدارات أندرويد الحديثة)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد تشغيل جرادل (الأكشن سيقوم بالتعامل مع غياب الـ Wrapper تلقائياً)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2.2' # هنا نخبر الأكشن مباشرة باستخدام هذا الإصدار للنظام بالكامل

    # 4. تشغيل عملية البناء مباشرة باستخدام أمر السيرفر العام بدلاً من المحرك المحلي المفقود
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    # 5. رفع ملفات الـ JAR الناتجة عن المشروع كـ Artifacts
    - name: Upload JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-JAR-Files
        path: |
          **/build/intermediates/**/*.jar
          **/build/libs/**/*.jar
        if-no-files-found: warn

    # 6. رفع ملف الـ APK الناتج
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
